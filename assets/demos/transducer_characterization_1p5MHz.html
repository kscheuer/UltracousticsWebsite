<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transducer Characterization — 35×35 mm</title>
<script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
<style>
:root {
    --bg: #0a0a12;
    --surface: #111119;
    --plot-bg: #0d0d16;
    --accent: #E91E8C;
    --accent-glow: rgba(233,30,140,0.25);
    --border: rgba(233,30,140,0.10);
    --border-hi: rgba(233,30,140,0.22);
    --text: #e8e8f2;
    --text-dim: #8888a0;
    --text-muted: #555570;
    --mono: 'Cascadia Mono','Consolas','Monaco',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;display:flex;flex-direction:column}

/* ── Header ─────────────────────────────────────── */
#header{display:flex;align-items:center;gap:16px;padding:7px 20px;border-bottom:1px solid var(--border);flex-shrink:0;background:linear-gradient(180deg,rgba(17,17,25,0.6) 0%,transparent 100%)}
.logo{height:30px;filter:invert(1) hue-rotate(180deg);opacity:0.92}
.logo-text{font-size:1.15em;font-weight:700;color:var(--accent);letter-spacing:0.04em}
.hdr-div{width:1px;height:28px;background:var(--border-hi)}
.hdr-info h1{font-size:1.05em;font-weight:600;letter-spacing:-0.01em;line-height:1.25}
.hdr-info p{font-size:0.72em;color:var(--text-dim);margin-top:1px;font-family:var(--mono);letter-spacing:0.01em}

/* ── Controls ───────────────────────────────────── */
#controls{display:flex;gap:36px;padding:7px 20px;align-items:center;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.025)}
#controls2{display:flex;gap:36px;padding:4px 20px;align-items:center;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.025)}
.cg{display:flex;align-items:center;gap:10px;flex:1;max-width:500px}
.cg label{font-size:0.8em;color:var(--text-dim);white-space:nowrap;min-width:114px}
.cg input[type=range]{-webkit-appearance:none;flex:1;height:4px;background:#1a1a2a;border-radius:2px;outline:none;cursor:pointer}
.cg input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 8px var(--accent-glow);border:2px solid var(--bg)}
.cg input[type=range]::-webkit-slider-runnable-track{height:4px;border-radius:2px}
.cg .val{min-width:82px;text-align:right;font-family:var(--mono);color:var(--accent);font-size:0.86em}
.hint{font-size:0.7em;color:var(--text-muted);margin-left:auto;font-style:italic;opacity:0.8}

/* ── Toggle Button ──────────────────────────────── */
.toggle-btn{padding:5px 14px;border-radius:5px;font-size:0.78em;font-family:var(--mono);border:1px solid var(--border-hi);background:transparent;color:var(--text-dim);cursor:pointer;transition:all .15s;white-space:nowrap;letter-spacing:0.01em}
.toggle-btn:hover{border-color:var(--accent);color:var(--text)}
.toggle-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 0 10px var(--accent-glow)}

/* ── Plot Grid ──────────────────────────────────── */
#grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr;gap:10px;padding:10px 14px;flex:1;min-height:0}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;min-height:0;position:relative}
#right{display:flex;flex-direction:column;gap:10px;min-height:0}
#profiles{display:grid;grid-template-columns:1fr 1fr;gap:10px;min-height:0;flex:1}

/* ── Footer ─────────────────────────────────────── */
#footer{display:flex;justify-content:center;align-items:center;gap:8px;padding:5px 20px;flex-shrink:0;font-size:0.68em;color:var(--text-muted);letter-spacing:0.03em}
#footer .dt{opacity:0.4;color:var(--accent)}

/* ── Loading Overlay ────────────────────────────── */
#loading{position:fixed;inset:0;background:rgba(10,10,18,0.97);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;gap:16px}
.spin{width:38px;height:38px;border:3px solid rgba(233,30,140,0.12);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#loading span{color:var(--accent);font-size:0.92em;letter-spacing:0.02em}

/* ── Plotly overrides ───────────────────────────── */
.modebar{background:transparent !important}
.modebar-btn path{fill:var(--text-muted) !important}
.modebar-btn:hover path{fill:var(--accent) !important}
.modebar-btn.active path{fill:var(--accent) !important}

/* ── Mobile Responsive ──────────────────────────── */
@media (max-width: 768px) {
    body{overflow:auto;height:auto;min-height:100vh}
    #header{flex-wrap:wrap;padding:8px 12px;gap:8px}
    .hdr-info h1{font-size:0.92em}
    .hdr-info p{font-size:0.65em}
    #controls,#controls2{flex-wrap:wrap;gap:10px;padding:8px 12px}
    .cg{max-width:100%;min-width:0;flex:1 1 100%}
    .cg label{min-width:90px;font-size:0.75em}
    .hint{width:100%;margin-left:0;text-align:center;margin-top:4px}
    #grid{grid-template-columns:1fr;grid-template-rows:auto;gap:8px;padding:8px;flex:none}
    #map{min-height:320px;height:70vw;max-height:420px}
    #right{gap:8px}
    #spec{min-height:260px}
    #profiles{grid-template-columns:1fr;gap:8px}
    #xp,#zp{min-height:220px}
    #footer{padding:8px 12px;flex-wrap:wrap;gap:4px}
}
</style>
</head>

(async function() {
  const urls = ['data/scan_chunk_0.bin', 'data/scan_chunk_1.bin'];
  const chunks = await Promise.all(urls.map(u => fetch(u).then(r => r.arrayBuffer())));
  const total = chunks.reduce((s, c) => s + c.byteLength, 0);
  const _raw = new Uint8Array(total);
  let offset = 0;
  for (const c of chunks) { _raw.set(new Uint8Array(c), offset); offset += c.byteLength; }
  var cube = pako.inflate(_raw);
  document.getElementById('loading').style.display='none';
// ── Helpers ───────────────────────────────────────────────────────────────────
function nearest(arr,v){var b=0,bd=Math.abs(arr[0]-v);for(var i=1;i<arr.length;i++){var d=Math.abs(arr[i]-v);if(d<bd){b=i;bd=d}}return b}
function pct(flat,p){var s=Float32Array.from(flat).sort();return s[Math.floor(p/100*(s.length-1))]}

function smooth(arr,w){
    if(w<=1)return arr.slice();
    var out=new Array(arr.length),hw=Math.floor(w/2);
    for(var i=0;i<arr.length;i++){
        var lo=Math.max(0,i-hw),hi=Math.min(arr.length-1,i+hw),s=0;
        for(var j=lo;j<=hi;j++)s+=arr[j];
        out[i]=s/(hi-lo+1);
    }
    return out;
}

function findPeaks(y,minProm){
    // Simple prominence-based peak finder
    var peaks=[];
    for(var i=2;i<y.length-2;i++){
        if(y[i]>y[i-1]&&y[i]>y[i+1]&&y[i]>y[i-2]&&y[i]>y[i+2]){
            // Compute prominence: min of left and right descent
            var lMin=y[i],rMin=y[i];
            for(var l=i-1;l>=0;l--){if(y[l]>y[i])break;if(y[l]<lMin)lMin=y[l]}
            for(var r=i+1;r<y.length;r++){if(y[r]>y[i])break;if(y[r]<rMin)rMin=y[r]}
            var prom=y[i]-Math.max(lMin,rMin);
            if(prom>=minProm)peaks.push({idx:i,freq:FREQ[i],val:y[i],prom:prom});
        }
    }
    // Sort by prominence, keep top 8
    peaks.sort(function(a,b){return b.prom-a.prom});
    return peaks.slice(0,8);
}

function beamWidth(axis,profile){
    // Find -6dB points relative to peak and return width + shape info
    var pk=0,pkI=0;
    for(var i=0;i<profile.length;i++){if(profile[i]>pk){pk=profile[i];pkI=i}}
    var thresh=pk-6;
    // Walk left from peak
    var lI=pkI;
    for(var i=pkI;i>=0;i--){if(profile[i]<thresh){lI=i;break}if(i===0)lI=0}
    // Walk right from peak
    var rI=pkI;
    for(var i=pkI;i<profile.length;i++){if(profile[i]<thresh){rI=i;break}if(i===profile.length-1)rI=i}
    // Interpolate for sub-pixel accuracy
    var lX=axis[lI],rX=axis[rI];
    if(lI>0&&lI<profile.length-1){
        var f=(thresh-profile[lI])/(profile[lI+1]-profile[lI]);
        lX=axis[lI]+f*(axis[lI+1]-axis[lI]);
    }
    if(rI>0&&rI<profile.length-1){
        var f=(thresh-profile[rI])/(profile[rI-1]-profile[rI]);
        rX=axis[rI]+f*(axis[rI-1]-axis[rI]);
    }
    return{width:Math.abs(rX-lX),thresh:thresh,peak:pk,lX:lX,rX:rX};
}

// ── Computation ───────────────────────────────────────────────────────────────
function computeBand(ctr,bw){
    var lo=nearest(FREQ,ctr-bw/2),hi=nearest(FREQ,ctr+bw/2);
    if(lo>hi){var t=lo;lo=hi;hi=t}
    var n=hi-lo+1;
    var bgAvg=0;
    if(bgMode){for(var f=lo;f<=hi;f++)bgAvg+=BG_REF[f];bgAvg/=n}
    for(var z=0;z<NZ;z++)for(var x=0;x<NX;x++){
        var base=(z*NX+x)*NF,s=0;
        for(var f=lo;f<=hi;f++)s+=cube[base+f];
        var dB=s/n/255.0*DB_RNG+DB_MIN;
        bandFlat[z*NX+x]=bgMode?dB-bgAvg:dB;
    }
}
function bandGrid(){var g=[];for(var z=0;z<NZ;z++)g.push(Array.from(bandFlat.subarray(z*NX,(z+1)*NX)));return g}
function getSpectrum(zi,xi){
    var s=new Array(NF),base=(zi*NX+xi)*NF;
    for(var f=0;f<NF;f++){
        var dB=cube[base+f]/255.0*DB_RNG+DB_MIN;
        s[f]=bgMode?dB-BG_REF[f]:dB;
    }
    return s;
}
function getXProfile(zi){return Array.from(bandFlat.subarray(zi*NX,(zi+1)*NX))}
function getZProfile(xi){var p=new Array(NZ);for(var z=0;z<NZ;z++)p[z]=bandFlat[z*NX+xi];return p}

        title:{text:'Spectrum @ X='+XR[cxi].toFixed(1)+', Z='+ZR[czi].toFixed(1)+' mm',font:{size:13,color:T}},
        shapes:bandRect(),
        annotations:peakAnnotations(sps)
    });
}

function updateProfiles(){
    var xd=getXProfile(czi);
    var zd=getZProfile(cxi);
    Plotly.update('xp',{y:[xd]},{
        'yaxis.autorange':true,
        title:{text:'X Profile @ Z='+ZR[czi].toFixed(1)+' mm',font:{size:12,color:T}},
        shapes:profileShapes(XR,xd,true),
        annotations:profileAnnotations(XR,xd,true)
    });
    Plotly.update('zp',{y:[zd]},{
        'yaxis.autorange':true,
        title:{text:'Z Profile @ X='+XR[cxi].toFixed(1)+' mm',font:{size:12,color:T}},
        shapes:profileShapes(ZR,zd,false),
        annotations:profileAnnotations(ZR,zd,false)
    });
}

function updateAll(){
    var cf=parseFloat(document.getElementById('cf').value);
    var bw=parseFloat(document.getElementById('bw').value);
    computeBand(cf,bw);
    var g=bandGrid();
    var vlo=pct(bandFlat,2),vhi=pct(bandFlat,98);

    Plotly.update('map',
        {z:[g],zmin:vlo,zmax:vhi},
        {title:{text:'Amplitude: '+cf.toFixed(2)+' \u00b1 '+(bw/2).toFixed(3)+' MHz',font:{size:13,color:T}},
         shapes:crosshairs()}
    );
    Plotly.relayout('spec',{shapes:bandRect()});
    updateProfiles();
}

function updateClick(){
    Plotly.relayout('map',{shapes:crosshairs()});
    updateSpec();
    updateProfiles();
}

// ── Events ────────────────────────────────────────────────────────────────────
var raf=null;
function onSlider(){
    document.getElementById('cfv').textContent=parseFloat(document.getElementById('cf').value).toFixed(2)+' MHz';
    document.getElementById('bwv').textContent=parseFloat(document.getElementById('bw').value).toFixed(3)+' MHz';
    if(raf)cancelAnimationFrame(raf);
    raf=requestAnimationFrame(function(){updateAll();raf=null});
}
document.getElementById('cf').addEventListener('input',onSlider);
document.getElementById('bw').addEventListener('input',onSlider);

// Smoothing slider
document.getElementById('sm').addEventListener('input',function(){
    smW=parseInt(this.value);
    document.getElementById('smv').textContent=smW+' pts';
    updateSpec();
});

document.getElementById('map').on('plotly_click',function(data){
    if(!data||!data.points||!data.points.length)return;
    var pt=data.points[0];
    cxi=nearest(XR,pt.x);
    czi=nearest(ZR,pt.y);
    updateClick();
});

// ── BG Subtract Toggle ───────────────────────────────────────────────────────
document.getElementById('bgBtn').addEventListener('click',function(){
    bgMode=!bgMode;
    this.classList.toggle('active',bgMode);
    var cf=parseFloat(document.getElementById('cf').value);
    var bw=parseFloat(document.getElementById('bw').value);
    computeBand(cf,bw);
    var g=bandGrid();
    var vlo=pct(bandFlat,2),vhi=pct(bandFlat,98);
    var yl=yLabel(),cbt=cbTitle();

    Plotly.update('map',
        {z:[g],zmin:vlo,zmax:vhi,'colorbar.title.text':cbt,colorscale:[bgMode?CS_DIV:CS_RAW]},
        {title:{text:'Amplitude: '+cf.toFixed(2)+' \u00b1 '+(bw/2).toFixed(3)+' MHz',font:{size:13,color:T}},shapes:crosshairs()}
    );
    Plotly.restyle('spec',{visible:[bgMode?false:true]},[2]);
    Plotly.relayout('spec',{'yaxis.title.text':yl});
    Plotly.relayout('xp',{'yaxis.title.text':yl});
    Plotly.relayout('zp',{'yaxis.title.text':yl});
    updateSpec();
    updateProfiles();
});

})();
</script>
</body>
</html>
